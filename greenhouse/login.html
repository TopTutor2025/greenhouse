<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi — Greenhouse</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/landing.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:10px;text-decoration:none">
        <div class="nav-logo-icon" style="width:44px;height:44px;background:#111;border-radius:12px;display:flex;align-items:center;justify-content:center">
          <svg viewBox="0 0 24 24" fill="none" style="width:26px;height:26px"><polygon points="12,2 1,11 23,11" fill="#5a9e6f"/><rect x="3" y="11" width="18" height="11" rx="1" fill="#5a9e6f"/><rect x="9.5" y="15" width="5" height="7" rx="0.8" fill="#111"/><rect x="4" y="13" width="4" height="4" rx="0.6" fill="#111"/><rect x="16" y="13" width="4" height="4" rx="0.6" fill="#111"/></svg>
        </div>
        <span style="font-size:22px;font-weight:800;color:var(--g800)">Green<span style="color:var(--primary)">house</span></span>
      </a>
    </div>
    <h1 class="auth-title">Bentornato</h1>
    <p class="auth-sub">Accedi alla tua area personale</p>

    <div id="error-banner" class="hidden" style="background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--r-sm);padding:12px 14px;font-size:14px;color:#991b1b;margin-bottom:18px;display:flex;align-items:center;gap:8px">
      <span>⚠️</span><span id="error-text"></span>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="login-email" class="form-control" placeholder="la-tua@email.it" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-toggle">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password" style="padding-right:44px">
          <button type="button" class="toggle-btn" id="toggle-pwd">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;margin-top:4px" id="login-btn">
        Accedi →
      </button>
    </form>

    <div class="auth-divider mt-6">oppure</div>

    <div style="text-align:center;margin-top:20px;font-size:14px;color:var(--g600)">
      Non hai un account?
      <a href="register.html" style="color:var(--primary);font-weight:600;text-decoration:none"> Registrati ora</a>
    </div>

    <div style="margin-top:24px;padding:14px;background:var(--primary-pale);border-radius:var(--r-sm);font-size:12.5px;color:var(--primary-d)">
      <strong>ℹ️ Prima volta?</strong> Registrati per creare il tuo account oppure contatta Greenhouse per ricevere le credenziali di accesso.
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
<script>
// Redirect if already logged in
(async () => {
  const session = await Auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('user_profiles').select('role').eq('id', session.user.id).single();
    window.location.href = profile?.role === 'admin' ? 'admin.html' : 'dashboard.html';
  }
})();

document.getElementById('toggle-pwd').addEventListener('click', function() {
  const inp = document.getElementById('login-password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁️' : '🙈';
});

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pwd   = document.getElementById('login-password').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('error-banner');
  const errT  = document.getElementById('error-text');

  btn.disabled = true; btn.textContent = 'Accesso in corso...';
  err.classList.add('hidden');

  const res = await Auth.login(email, pwd);
  if (res.success) {
    window.location.href = res.type === 'admin' ? 'admin.html' : 'dashboard.html';
  } else {
    errT.textContent = res.error || 'Credenziali non valide';
    err.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Accedi →';
  }
});
</script>
<script src="js/cookie-banner.js"></script>
</body>
</html>
